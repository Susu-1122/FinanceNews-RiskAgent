<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FinanceNews-RiskAgent</title>
    <style>
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            margin: 40px;
            background: #f6f8fa;
            color: #222;
        }

        h1 {
            margin-bottom: 8px;
        }

        h2 {
            margin-top: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 18px;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
        }

        .card-title {
            color: #666;
            font-size: 14px;
        }

        .card-value {
            font-size: 22px;
            font-weight: bold;
            margin-top: 6px;
            word-break: break-word;
        }

        .news-list {
            display: grid;
            gap: 12px;
        }

        .news-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            background: #fcfcfd;
        }

        .news-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .news-meta {
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        .result-box {
            white-space: pre-wrap;
            background: #111827;
            color: #e5e7eb;
            padding: 18px;
            border-radius: 8px;
            min-height: 160px;
            line-height: 1.6;
            overflow-x: auto;
        }

        @media (max-width: 800px) {
            body {
                margin: 16px;
            }

            .summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h1>财经新闻风险联动智能调研助手</h1>
        <p>输入股票或行业信息，系统会生成新闻情绪、风险预测和调研报告。</p>

        <label for="stockName">股票名称</label>
        <input id="stockName" value="宁德时代">

        <label for="stockCode">股票代码</label>
        <input id="stockCode" value="300750">

        <label for="industry">行业</label>
        <input id="industry" value="新能源车">

        <button onclick="analyze()">开始分析</button>
    </div>

    <div class="panel">
        <h2>分析总览</h2>

        <div class="summary">
            <div class="card">
                <div class="card-title">风险等级</div>
                <div class="card-value" id="riskLevel">-</div>
            </div>
            <div class="card">
                <div class="card-title">风险概率</div>
                <div class="card-value" id="riskProbability">-</div>
            </div>
            <div class="card">
                <div class="card-title">整体情绪</div>
                <div class="card-value" id="overallSentiment">-</div>
            </div>
            <div class="card">
                <div class="card-title">新闻数量</div>
                <div class="card-value" id="newsCount">-</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>关键新闻与评分</h2>
        <div id="newsList" class="news-list">等待分析...</div>
    </div>

    <div class="panel">
        <h2>调研报告</h2>
        <div id="reportText" class="result-box">等待分析...</div>
    </div>
</div>

<script>
    async function analyze() {
        const stockName = document.getElementById("stockName").value;
        const stockCode = document.getElementById("stockCode").value;
        const industry = document.getElementById("industry").value;

        const reportBox = document.getElementById("reportText");
        const newsList = document.getElementById("newsList");

        reportBox.textContent = "正在分析，请稍等...";
        newsList.textContent = "正在获取新闻与评分...";

        const params = new URLSearchParams({
            stock_name: stockName,
            stock_code: stockCode,
            industry: industry
        });

        try {
            const response = await fetch(`/analyze?${params.toString()}`);
            const data = await response.json();

            document.getElementById("riskLevel").textContent = data.risk.risk_level;
            document.getElementById("riskProbability").textContent = data.risk.risk_probability;
            document.getElementById("overallSentiment").textContent = data.sentiment.overall_sentiment;
            document.getElementById("newsCount").textContent = data.news.length;

            renderNewsList(data.news, data.scores);
            reportBox.textContent = data.report_text;
        } catch (error) {
            reportBox.textContent = "分析失败：" + error;
            newsList.textContent = "新闻展示失败：" + error;
        }
    }

    function renderNewsList(news, scores) {
        const newsList = document.getElementById("newsList");
        newsList.innerHTML = "";

        if (!news || news.length === 0) {
            newsList.textContent = "没有找到相关新闻。";
            return;
        }

        news.forEach((item, index) => {
            const score = scores[index];

            const div = document.createElement("div");
            div.className = "news-item";

            div.innerHTML = `
                <div class="news-title">${index + 1}. ${escapeHtml(item.title)}</div>
                <div class="news-meta">
                    摘要：${escapeHtml(item.summary || "无")}<br>
                    来源：${escapeHtml(item.source || "unknown")}<br>
                    发布时间：${escapeHtml(item.published_at || "未知")}<br>
                    情绪分：${score ? score.sentiment_score : "-"}，
                    风险分：${score ? score.risk_score : "-"}，
                    事件类型：${score ? escapeHtml(score.event_type) : "-"}<br>
                    评分理由：${score ? escapeHtml(score.reason) : "-"}
                </div>
            `;

            newsList.appendChild(div);
        });
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
